name: Build (Windows)

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

env:
  SOLUTION_FILE_PATH: .
  BUILD_CONFIGURATION: Release
  BUILD_PLATFORM: Win64

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup premake
      uses: abel0b/setup-premake@v2.4
      with:
        version: "5.0.0-beta2"

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.0.2

    - name: Set commit SHA
      run: echo "COMMIT_SHA=${{ github.sha }}" >> $env:GITHUB_ENV

    - name: Run premake
      run: ./setupVS.bat

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} /p:Platform=${{env.BUILD_PLATFORM}} ${{env.SOLUTION_FILE_PATH}}

    - name: Copy exe to workdir
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/workdir"
        Copy-Item -Path "${{ github.workspace }}/TuneBloom/bin/TuneBloom-Win64-Release/out/TuneBloom.exe" `
          -Destination "${{ github.workspace }}/workdir/"

    - name: Zip workdir contents
      shell: pwsh
      run: |
        $date = Get-Date -Format "yyyy-MM-dd"
        Compress-Archive `
          -Path "${{ github.workspace }}/workdir/*" `
          -DestinationPath "${{ github.workspace }}/nightly-$date.zip"
        echo "RELEASE_DATE=$date" >> $env:GITHUB_ENV

    - name: Create or update nightly release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: nightly-${{ env.RELEASE_DATE }}
        name: "Nightly Beta — ${{ env.RELEASE_DATE }}"
        body: "Automated nightly build from commit ${{ github.sha }}"
        prerelease: true
        files: nightly-${{ env.RELEASE_DATE }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
